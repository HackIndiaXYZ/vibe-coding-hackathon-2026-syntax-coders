services:
  db:
    image: postgres:16-alpine
    container_name: lifelink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifelink
    ports:
      - "5432:5432"
    volumes:
      - lifelink_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lifelink"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lifelink_postgres_data:
